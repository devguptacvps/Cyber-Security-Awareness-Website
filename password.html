<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Checker - CyberShield</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* Body */
body {
    background: linear-gradient(135deg,#0a0f1c,#111827);
    color:white;
    padding-top:80px;
}

/* Navbar */
.navbar {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:rgba(0,0,0,0.6);
    border-bottom:1px solid rgba(0,255,204,0.2);
    z-index:1000;
}

.logo {
    color:#00ffcc;
}

/* Nav Links */
.navbar ul {
    list-style:none;
    display:flex;
    gap:20px;
}

.navbar ul li a {
    color:white;
    text-decoration:none;
}

.navbar ul li a:hover {
    color:#00ffcc;
}

/* Container */
.container {
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
}

/* Card */
.card {
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:350px;
    border:1px solid rgba(0,255,204,0.2);
}

/* Input */
input {
    padding:12px;
    width:100%;
    margin:10px 0;
    border-radius:5px;
    border:none;
}

/* Strength Bar Container */
.strength {
    height:12px;
    background:#222;
    border-radius:10px;
    margin-top:10px;
    overflow:hidden;
    width:100%;
}

/* Strength Bar */
#strengthBar {
    height:100%;
    width:5%; /* 👈 small visible default */
    background:red;
    border-radius:10px;
    transition:0.4s ease;
}

/* Result */
#result {
    margin-top:10px;
    font-weight:bold;
}
</style>

</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <h2 class="logo">🛡️ CyberShield</h2>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="phishing.html">Phishing Detector</a></li>
        <li><a href="password.html">Password Checker</a></li>
        <li><a href="malware.html">Malware Info</a></li>
        <li><a href="quiz.html">Quiz</a></li>
    </ul>
</nav>

<!-- Content -->
<div class="container">

<div class="card">
    <h2>🔐 Password Strength Checker</h2>

    <input type="password" id="password" placeholder="Enter password" oninput="checkPassword()">

    <div class="strength">
        <div id="strengthBar"></div>
    </div>

    <div id="result"></div>
</div>

</div>

<script>
function checkPassword(){
    let pass = document.getElementById("password").value;
    let bar = document.getElementById("strengthBar");
    let result = document.getElementById("result");

    let strength = 0;

    if(pass.length > 0) strength += 10;
    if(pass.length >= 6) strength += 20;
    if(pass.length >= 10) strength += 10;
    if(/[A-Z]/.test(pass)) strength += 20;
    if(/[0-9]/.test(pass)) strength += 20;
    if(/[^A-Za-z0-9]/.test(pass)) strength += 20;

    // Apply width
    bar.style.width = strength + "%";

    // Color + text
    if(strength <= 30){
        bar.style.background = "red";
        result.innerText = "Weak Password ❌";
    }
    else if(strength <= 60){
        bar.style.background = "orange";
        result.innerText = "Medium Password ⚠️";
    }
    else if(strength <= 80){
        bar.style.background = "yellow";
        result.innerText = "Strong Password 👍";
    }
    else{
        bar.style.background = "#00ffcc";
        result.innerText = "Very Strong Password 🔥";
    }
}
</script>

</body>
</html>
